[project]
name = "finguard-workspace"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "httpx>=0.28.1",
    "langchain-openai>=1.1.14",
    "langgraph>=1.1.6",
    "psycopg2-binary>=2.9.11",
    "python-dotenv>=1.2.2",
    "sqlalchemy>=2.0.49",
    "transaction-engine",
]

[tool.uv.workspace]
members = ["application-agents/*", "packages/*"]

[tool.uv.sources]
transaction-engine = { workspace = true }

[tool.ruff]
line-length = 120
[tool.ruff.lint]
select = ["F", "I", "ARG"]
