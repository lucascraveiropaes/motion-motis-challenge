[project]
name = "finguard-workspace"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = []

[tool.uv.workspace]
members = ["application-agents/*", "packages/*"]

[tool.uv.sources]
transaction-engine = { workspace = true }
classifier-agent = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.3.3",
    "pytest-asyncio>=0.24.0",
    "pytest-cov>=5.0.0",
    "httpx>=0.27.2",
    "ruff>=0.7.0",
    "mypy>=1.13.0",
]
prod = [
    "gunicorn>=23.0.0",
    "uvicorn[standard]>=0.32.0",
]

[tool.ruff]
line-length = 120
target-version = "py313"
extend-exclude = ["**/alembic/versions/*.py"]

[tool.ruff.lint]
select = ["F", "I", "ARG", "E", "W", "B", "UP"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's Depends / Query / Path / Header / Body are designed to be called
# in argument defaults; ignore B008 for them.
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Body",
    "fastapi.Cookie",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Security",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["application-agents/classifier-agent/tests"]
pythonpath = [
    "application-agents/classifier-agent/src",
    "packages/transaction-engine/src",
]

[tool.coverage.run]
source = ["classifier_agent", "transaction_engine"]
omit = ["*/alembic/*", "*/tests/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
fail_under = 90

[tool.mypy]
python_version = "3.13"
strict = false
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = [
    "application-agents/classifier-agent/src",
    "packages/transaction-engine/src",
]
exclude = ["alembic/versions"]
